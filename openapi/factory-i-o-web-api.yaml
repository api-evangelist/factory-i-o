        '4XX':
          description: Client error
        '5XX':
          description: Factory I/O server error
  /api/tag/values-release/by-name:
    put:
      summary: Release forced tag values by name
      description: Release forced value of tags in the scene using the name to identify tags.
      operationId: setTagValuesReleaseByName
      tags:
        - Tag Values by Name
      requestBody:
        description: Array of tag names to release.
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
            example:
              - Front conveyor
              - At scale entry
      responses:
        '200':
          description: Array of per-item results (errors only for failed items)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagValueByNameResult'
        '4XX':
          description: Client error
        '5XX':
          description: Factory I/O server error
  /api/tag/values-alwaysoff/by-name:
    put:
      summary: Set Always Off tag values by name
      description: Set the Always Off value of tags in the scene using the name to identify tags.
      operationId: setTagValuesAlwaysOffByName
      tags:
        - Tag Values by Name
      requestBody:
        description: Array of tag value objects with name and value.
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/TagValueByNameInput'
      responses:
        '200':
          description: Array of per-item results (errors only for failed items)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagValueByNameResult'
        '4XX':
          description: Client error
        '5XX':
          description: Factory I/O server error
  /api/tag/values-alwayson/by-name:
    put:
      summary: Set Always On tag values by name
      description: Set the Always On value of tags in the scene using the name to identify tags.
      operationId: setTagValuesAlwaysOnByName
      tags:
        - Tag Values by Name
      requestBody:
        description: Array of tag value objects with name and value.
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/TagValueByNameInput'
      responses:
        '200':
          description: Array of per-item results (errors only for failed items)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagValueByNameResult'
        '4XX':
          description: Client error
        '5XX':
          description: Factory I/O server error
components:
  schemas:
    Tag:
      type: object
      description: Object representing a tag in the Factory I/O scene.
      properties:
        name:
          type: string
          description: Name of the tag.
          example: Left conveyor
        id:
          type: string
          format: uuid
          description: Unique identifier for the tag.
          example: b61dc29b-650d-4145-be65-4fea9cffc802
        address:
          type: integer
          description: Tag address.
          example: 8
        type:
          type: string
          description: Data type of the tag's value.
          enum:
            - Bit
            - Int
            - Float
          example: Bit
        kind:
          type: string
          description: Kind of tag from the controller point of view.
          enum:
            - Input
            - Output
          example: Output
        value:
          description: Current tag value (boolean for Bit, integer for Int, number for Float).
          oneOf:
            - type: boolean
            - type: number
          example: false
        openCircuit:
          type: boolean
          description: Whether the tag has an always-off failure.
          example: false
        shortCircuit:
          type: boolean
          description: Whether the tag has an always-on failure.
          example: false
        isForced:
          type: boolean
          description: Whether the tag is forced.
          example: false
        forcedValue:
          description: Tag value when forced (boolean for Bit, number for Int/Float).
          oneOf:
            - type: boolean
            - type: number
          example: false
      required:
        - name
        - id
        - address
        - type
        - kind
        - value
        - openCircuit
        - shortCircuit
        - isForced
        - forcedValue
    TagValueInput:
      type: object
      description: Input object for setting a tag value, identified by id.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the tag.
          example: a32d5732-18aa-4700-a4c7-c00d7cd18f41
        value:
          description: Value to set (boolean for Bit, integer for Int, number for Float).
          oneOf:
            - type: boolean
            - type: number
      required:
        - id
        - value
    TagValueResult:
      type: object
      description: Result for a single tag value operation, identified by id.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the tag.
        value:
          description: Current tag value (present on success).
          oneOf:
            - type: boolean
            - type: number
        code:
          type: integer
          description: HTTP-like error code (present on per-item error).
          example: 404
        error:
          type: string
          description: Error message (present on per-item error).
          example: "Tag with id '...' not found."
      required:
        - id
    TagValueByNameInput:
      type: object
      description: Input object for setting a tag value, identified by name.
      properties:
        name:
          type: string
          description: Name of the tag.
          example: Front conveyor
        value:
          description: Value to set (boolean for Bit, integer for Int, number for Float).
          oneOf:
            - type: boolean
            - type: number
      required:
        - name
        - value
    TagValueByNameResult:
      type: object
      description: Result for a single tag value operation, identified by name.
      properties:
        name:
          type: string
          description: Name of the tag.
        value:
          description: Current tag value (present on success).
          oneOf:
            - type: boolean
            - type: number
        code:
          type: integer
          description: HTTP-like error code (present on per-item error).
          example: 406
        error:
          type: string
          description: Error message (present on per-item error).
      required:
        - name
    ErrorResponse:
      type: object
      description: Top-level error response from the Factory I/O web server.
      properties:
        code:
          type: integer
          description: HTTP error code.
        error:
          type: string
          description: Human-readable error message.
