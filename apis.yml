    name: FACTORY I/O Web API
    description: >-
      The web server in Factory I/O exposes a REST API for reading and writing
      simulation values from external clients. The web server uses conventional
      HTTP response codes to indicate success or failure: 2xx for success, 4xx
      for client errors, and 5xx for errors in Factory I/O.
